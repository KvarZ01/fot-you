<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Calzen — Трекер калорий</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- ШАПКА -->
        <div class="app-header">
            <div class="logo-area">
                <span class="logo-icon">🔥</span>
                <span class="logo-text">Calzen</span>
            </div>
            <div class="settings-icon" id="settingsButton">⚙️</div>
        </div>

        <div class="content">
            <!-- КОЛЬЦО КАЛОРИЙ -->
            <div class="calorie-ring-container">
                <div class="calorie-ring">
                    <svg width="220" height="220" viewBox="0 0 220 220">
                        <circle cx="110" cy="110" r="95" fill="none" stroke="#1c1c1e" stroke-width="14"/>
                        <circle id="calorieRingProgress" cx="110" cy="110" r="95" fill="none" stroke="#ff3b30" stroke-width="14" stroke-dasharray="596.9" stroke-dashoffset="596.9" stroke-linecap="round" transform="rotate(-90 110 110)"/>
                    </svg>
                    <div class="calorie-ring-text">
                        <div class="calorie-current" id="calorieCurrent">0</div>
                        <div class="calorie-target">/ <span id="calorieTarget">2500</span></div>
                        <div class="calorie-label">калорий</div>
                    </div>
                </div>
            </div>

            <!-- БЖУ ПОЛОСКИ -->
            <div class="macros-container">
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🥩</span>
                        <span class="macro-name">Белки</span>
                        <span class="macro-values"><span id="proteinCurrent">0</span> / <span id="proteinTarget">150</span> г</span>
                    </div>
                    <div class="macro-bar"><div class="macro-fill protein-fill" id="proteinFill" style="width: 0%"></div></div>
                </div>
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🧈</span>
                        <span class="macro-name">Жиры</span>
                        <span class="macro-values"><span id="fatsCurrent">0</span> / <span id="fatsTarget">65</span> г</span>
                    </div>
                    <div class="macro-bar"><div class="macro-fill fats-fill" id="fatsFill" style="width: 0%"></div></div>
                </div>
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🍚</span>
                        <span class="macro-name">Углеводы</span>
                        <span class="macro-values"><span id="carbsCurrent">0</span> / <span id="carbsTarget">250</span> г</span>
                    </div>
                    <div class="macro-bar"><div class="macro-fill carbs-fill" id="carbsFill" style="width: 0%"></div></div>
                </div>
            </div>

            <!-- ВОДА -->
            <div class="water-container">
                <div class="water-header">
                    <span class="water-icon">💧</span>
                    <span class="water-name">Вода</span>
                    <span class="water-values"><span id="waterCurrent">0</span> / <span id="waterTarget">2000</span> мл</span>
                    <button class="edit-water-btn" id="editWaterBtn">✏️</button>
                </div>
                <div class="water-bar"><div class="water-fill" id="waterFill" style="width: 0%"></div></div>
                <div class="water-buttons">
                    <button class="water-btn-small" data-water="50">+50</button>
                    <button class="water-btn-small" data-water="100">+100</button>
                    <button class="water-btn-small" data-water="150">+150</button>
                    <button class="water-btn-small" data-water="200">+200</button>
                    <button class="water-btn-small" data-water="250">+250</button>
                    <button class="water-btn-small" data-water="500">+500</button>
                </div>
            </div>

            <div class="add-food-button">
                <button class="add-food-main" id="addFoodMainBtn">🍽️ Добавить приём пищи</button>
            </div>
        </div>

        <!-- КРУГЛАЯ ИИ КНОПКА -->
        <div class="ai-fab" id="aiFabButton">🤖</div>

        <!-- МОДАЛКА НАСТРОЕК (ПРОСТАЯ РАБОЧАЯ) -->
        <div id="settingsModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:#1c1c1e; border-radius:28px; width:90%; max-width:380px; max-height:85vh; overflow-y:auto;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:0.5px solid #2c2c2e;">
                    <h3 style="font-size:20px;">⚙️ Параметры</h3>
                    <span id="closeSettingsBtn" style="font-size:28px; cursor:pointer;">&times;</span>
                </div>
                <div style="padding:20px;">
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">👤 Ваше имя</label>
                        <input type="text" id="userFullName" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">⚖️ Вес (кг)</label>
                        <input type="number" id="userWeight" step="0.1" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">📏 Рост (см)</label>
                        <input type="number" id="userHeight" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🎂 Возраст</label>
                        <input type="number" id="userAge" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">⚧ Пол</label>
                        <select id="userGender" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🏃 Активность</label>
                        <select id="userActivity" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                            <option value="1.2">Минимальная</option>
                            <option value="1.375">Низкая (1-3 тренировки)</option>
                            <option value="1.55">Средняя (3-5 тренировок)</option>
                            <option value="1.725">Высокая (6-7 тренировок)</option>
                            <option value="1.9">Очень высокая</option>
                        </select>
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🎯 Цель</label>
                        <select id="userGoal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                            <option value="maintain">Поддержание</option>
                            <option value="lose">Похудение</option>
                            <option value="gain">Набор массы</option>
                        </select>
                    </div>
                    <div style="height:1px; background:#2c2c2e; margin:20px 0;"></div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🔥 Норма калорий</label>
                        <input type="number" id="setCalorieGoalModal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🥩 Белки (г)</label>
                        <input type="number" id="setProteinGoalModal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🧈 Жиры (г)</label>
                        <input type="number" id="setFatsGoalModal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">🍚 Углеводы (г)</label>
                        <input type="number" id="setCarbsGoalModal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                    <div style="margin-bottom:16px;">
                        <label style="display:block; font-size:14px; color:#8e8e93; margin-bottom:6px;">💧 Вода (мл)</label>
                        <input type="number" id="setWaterGoalModal" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white;">
                    </div>
                </div>
                <div style="padding:16px 20px; border-top:0.5px solid #2c2c2e;">
                    <button id="saveSettingsBtn" style="width:100%; background:#0a84ff; border:none; padding:14px; border-radius:14px; color:white; font-weight:600; cursor:pointer;">💾 Сохранить</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛКА ДОБАВЛЕНИЯ ЕДЫ -->
        <div id="addFoodModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center;">
            <div style="background:#1c1c1e; border-radius:28px; width:90%; max-width:380px;">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:18px 20px; border-bottom:0.5px solid #2c2c2e;">
                    <h3 id="foodModalTitle">🍽️ Добавить еду</h3>
                    <span id="closeAddFoodBtn" style="font-size:28px; cursor:pointer;">&times;</span>
                </div>
                <div style="padding:20px;">
                    <input type="hidden" id="editingFoodId">
                    <input type="text" id="foodName" placeholder="Название" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; margin-bottom:12px;">
                    <input type="number" id="foodCal" placeholder="Калории" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; margin-bottom:12px;">
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px;">
                        <input type="number" id="foodProt" placeholder="Белки" style="background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; text-align:center;">
                        <input type="number" id="foodFat" placeholder="Жиры" style="background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; text-align:center;">
                        <input type="number" id="foodCarb" placeholder="Углеводы" style="background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; text-align:center;">
                    </div>
                    <select id="foodMealType" style="width:100%; background:#2c2c2e; border:none; padding:12px; border-radius:12px; color:white; margin-bottom:12px;">
                        <option value="breakfast">🍳 Завтрак</option>
                        <option value="lunch">🥗 Обед</option>
                        <option value="dinner">🍲 Ужин</option>
                        <option value="snack">🍎 Перекус</option>
                    </select>
                    <button id="confirmAddFoodBtn" style="width:100%; background:#ff3b30; border:none; padding:14px; border-radius:14px; color:white; font-weight:600; cursor:pointer;">Добавить</button>
                </div>
            </div>
        </div>

        <!-- ИСТОРИЯ -->
        <div class="history-section">
            <div class="history-header"><span>📋 Сегодня</span><span class="history-total" id="mealsCount">0</span></div>
            <div id="mealsHistoryList" class="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
