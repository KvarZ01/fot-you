<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>Calzen — Трекер калорий</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- Шапка с шестерёнкой -->
        <div class="app-header">
            <div class="logo-area">
                <span class="logo-icon">🔥</span>
                <span class="logo-text">Calzen</span>
            </div>
            <div class="settings-icon" id="settingsButton">⚙️</div>
        </div>

        <!-- Основной контент -->
        <div class="content">
            <!-- КОЛЬЦО КАЛОРИЙ -->
            <div class="calorie-ring-container">
                <div class="calorie-ring">
                    <svg width="220" height="220" viewBox="0 0 220 220">
                        <circle cx="110" cy="110" r="95" fill="none" stroke="#1c1c1e" stroke-width="14"/>
                        <circle id="calorieRingProgress" cx="110" cy="110" r="95" fill="none" stroke="#ff3b30" stroke-width="14" stroke-dasharray="596.9" stroke-dashoffset="596.9" stroke-linecap="round" transform="rotate(-90 110 110)"/>
                    </svg>
                    <div class="calorie-ring-text">
                        <div class="calorie-current" id="calorieCurrent">0</div>
                        <div class="calorie-target">/ <span id="calorieTarget">2500</span></div>
                        <div class="calorie-label">калорий</div>
                    </div>
                </div>
            </div>

            <!-- БЖУ ПОЛОСКИ -->
            <div class="macros-container">
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🥩</span>
                        <span class="macro-name">Белки</span>
                        <span class="macro-values"><span id="proteinCurrent">0</span> / <span id="proteinTarget">150</span> г</span>
                    </div>
                    <div class="macro-bar">
                        <div class="macro-fill protein-fill" id="proteinFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🧈</span>
                        <span class="macro-name">Жиры</span>
                        <span class="macro-values"><span id="fatsCurrent">0</span> / <span id="fatsTarget">65</span> г</span>
                    </div>
                    <div class="macro-bar">
                        <div class="macro-fill fats-fill" id="fatsFill" style="width: 0%"></div>
                    </div>
                </div>
                <div class="macro-row-item">
                    <div class="macro-header">
                        <span class="macro-icon">🍚</span>
                        <span class="macro-name">Углеводы</span>
                        <span class="macro-values"><span id="carbsCurrent">0</span> / <span id="carbsTarget">250</span> г</span>
                    </div>
                    <div class="macro-bar">
                        <div class="macro-fill carbs-fill" id="carbsFill" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- ВОДА ПОЛОСКА -->
            <div class="water-container">
                <div class="water-header">
                    <span class="water-icon">💧</span>
                    <span class="water-name">Вода</span>
                    <span class="water-values"><span id="waterCurrent">0</span> / <span id="waterTarget">2000</span> мл</span>
                    <button class="edit-water-btn" id="editWaterBtn">✏️</button>
                </div>
                <div class="water-bar">
                    <div class="water-fill" id="waterFill" style="width: 0%"></div>
                </div>
                <div class="water-buttons" id="waterButtonsContainer">
                    <button class="water-btn-small" data-water="50">+50</button>
                    <button class="water-btn-small" data-water="100">+100</button>
                    <button class="water-btn-small" data-water="150">+150</button>
                    <button class="water-btn-small" data-water="200">+200</button>
                    <button class="water-btn-small" data-water="250">+250</button>
                    <button class="water-btn-small" data-water="500">+500</button>
                </div>
            </div>

            <!-- КНОПКА ДОБАВЛЕНИЯ ЕДЫ -->
            <div class="add-food-button">
                <button class="add-food-main" id="addFoodMainBtn">
                    <span>🍽️</span> Добавить приём пищи
                </button>
            </div>
        </div>

        <!-- КРУГЛАЯ ИИ-КНОПКА -->
        <div class="ai-fab" id="aiFabButton">
            <span class="ai-icon">🤖</span>
            <span class="ai-label">ИИ</span>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО ДОБАВЛЕНИЯ/РЕДАКТИРОВАНИЯ ЕДЫ -->
        <div id="addFoodModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 id="foodModalTitle">🍽️ Добавить еду</h3>
                    <span class="modal-close" id="closeAddFoodModal">&times;</span>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editingFoodId" value="">
                    <input type="text" id="foodName" placeholder="Название блюда">
                    <input type="number" id="foodCal" placeholder="Калории">
                    <div class="macro-inputs-modal">
                        <input type="number" id="foodProt" placeholder="Белки">
                        <input type="number" id="foodFat" placeholder="Жиры">
                        <input type="number" id="foodCarb" placeholder="Углеводы">
                    </div>
                    <select id="foodMealType">
                        <option value="breakfast">🍳 Завтрак</option>
                        <option value="lunch">🥗 Обед</option>
                        <option value="dinner">🍲 Ужин</option>
                        <option value="snack">🍎 Перекус</option>
                    </select>
                    <button class="add-btn-modal" id="confirmAddFoodBtn">Добавить</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО РЕДАКТИРОВАНИЯ ВОДЫ -->
        <div id="editWaterModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>💧 Редактировать воду</h3>
                    <span class="modal-close" id="closeEditWaterModal">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="param-group">
                        <label>Текущее количество воды (мл)</label>
                        <input type="number" id="editWaterAmount" placeholder="мл">
                    </div>
                    <button id="saveWaterBtn" class="save-water-btn">💾 Сохранить</button>
                    <button id="resetWaterBtn" class="reset-water-btn">🗑️ Сбросить воду</button>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО ИИ -->
        <div id="aiModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>🤖 ИИ анализ еды</h3>
                    <span class="modal-close" id="closeAIModal">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="ai-options">
                        <button class="ai-option-btn" id="galleryBtn">📸 Выбрать из галереи</button>
                        <button class="ai-option-btn" id="cameraBtn">🎥 Сделать фото</button>
                    </div>
                    <div id="aiPreview" class="ai-preview hidden">
                        <img id="aiPreviewImg" src="">
                        <button id="analyzeBtn" class="analyze-btn">🔍 Распознать</button>
                    </div>
                    <div id="aiResult" class="ai-result hidden"></div>
                </div>
            </div>
        </div>

        <!-- МОДАЛЬНОЕ ОКНО НАСТРОЕК -->
        <div id="settingsModal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>⚙️ Параметры</h3>
                    <span class="modal-close" id="closeSettingsModal">&times;</span>
                </div>
                <div class="modal-body">
                    <div class="param-group">
                        <label>👤 Ваше имя</label>
                        <input type="text" id="userFullName" placeholder="Имя">
                    </div>
                    <div class="param-group">
                        <label>⚖️ Вес (кг)</label>
                        <input type="number" id="userWeight" step="0.1" placeholder="Вес">
                    </div>
                    <div class="param-group">
                        <label>📏 Рост (см)</label>
                        <input type="number" id="userHeight" placeholder="Рост">
                    </div>
                    <div class="param-group">
                        <label>🎂 Возраст</label>
                        <input type="number" id="userAge" placeholder="Возраст">
                    </div>
                    <div class="param-group">
                        <label>⚧ Пол</label>
                        <select id="userGender">
                            <option value="male">Мужской</option>
                            <option value="female">Женский</option>
                        </select>
                    </div>
                    <div class="param-group">
                        <label>🏃 Активность</label>
                        <select id="userActivity">
                            <option value="1.2">Минимальная</option>
                            <option value="1.375">Низкая (1-3 тренировки)</option>
                            <option value="1.55">Средняя (3-5 тренировок)</option>
                            <option value="1.725">Высокая (6-7 тренировок)</option>
                            <option value="1.9">Очень высокая</option>
                        </select>
                    </div>
                    <div class="param-group">
                        <label>🎯 Цель</label>
                        <select id="userGoal">
                            <option value="maintain">Поддержание</option>
                            <option value="lose">Похудение (-500 ккал)</option>
                            <option value="gain">Набор массы (+300 ккал)</option>
                        </select>
                    </div>
                    <div class="param-divider"></div>
                    <div class="param-group">
                        <label>🔥 Норма калорий</label>
                        <input type="number" id="setCalorieGoalModal">
                    </div>
                    <div class="param-group">
                        <label>🥩 Белки (г)</label>
                        <input type="number" id="setProteinGoalModal">
                    </div>
                    <div class="param-group">
                        <label>🧈 Жиры (г)</label>
                        <input type="number" id="setFatsGoalModal">
                    </div>
                    <div class="param-group">
                        <label>🍚 Углеводы (г)</label>
                        <input type="number" id="setCarbsGoalModal">
                    </div>
                    <div class="param-group">
                        <label>💧 Вода (мл)</label>
                        <input type="number" id="setWaterGoalModal">
                    </div>
                </div>
                <div class="modal-footer">
                    <button id="saveSettingsBtn">💾 Сохранить</button>
                </div>
            </div>
        </div>

        <!-- История приёмов пищи -->
        <div class="history-section">
            <div class="history-header">
                <span>📋 Сегодня</span>
                <span class="history-total" id="mealsCount">0</span>
            </div>
            <div id="mealsHistoryList" class="history-list"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
